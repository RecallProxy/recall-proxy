# Multi-engine orchestration configuration
#
# This example shows the full MVP setup: semantic, structural, and
# temporal providers wired through the gateway.

bind_address: "127.0.0.1:8080"

providers:
  - name: semantic_primary
    kind: semantic
  - name: semantic_fallback
    kind: semantic
  - name: graph_engine
    kind: structural
  - name: timeline_store
    kind: temporal
